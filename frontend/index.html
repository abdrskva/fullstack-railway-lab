<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Dashboard | Salima</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Ubuntu+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3498db; --secondary: #2c3e50; --success: #2ecc71; --danger: #e74c3c; --bg: #f0f2f5; --card-bg: #ffffff; --text: #333; --text-light: #7f8c8d; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; background-color: var(--secondary); color: white; padding: 15px 0; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 800px; width: 90%; margin: 30px 0; display: flex; flex-direction: column; gap: 20px; }
        .profile-card { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; border-left: 5px solid var(--primary); }
        .avatar { width: 70px; height: 70px; background: var(--secondary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 600; }
        .task-section { background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex-grow: 1; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; }
        .btn-add { padding: 12px 20px; background-color: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        ul { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; }
        li { background: #fbfbfb; padding: 15px; border-radius: 8px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background: none; border: none; color: #bdc3c7; cursor: pointer; font-size: 1.2rem; }
        .btn-del:hover { color: var(--danger); }
    </style>
</head>
<body>
    <header><h1><i class="fas fa-server"></i> DevOps Lab Pipeline</h1></header>
    <div class="container">
        <div class="profile-card">
            <div class="avatar">СА</div>
            <div class="info">
                <h2>Салима Абдырасакова</h2>
                <p><i class="fas fa-graduation-cap"></i> COMCEH-23</p>
            </div>
        </div>
        <div class="task-section">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Введите данные...">
                <button class="btn-add" onclick="addTask()">Добавить</button>
            </div>
            <ul id="taskList"></ul>
        </div>
    </div>
    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:5000' : ''; 
        async function loadTasks() {
            const res = await fetch(`${API_URL}/api/data`);
            const data = await res.json();
            document.getElementById('taskList').innerHTML = data.map(t => `<li><span>${t.title}</span><button class="btn-del" onclick="deleteTask(${t.id})"><i class="fas fa-trash-alt"></i></button></li>`).join('');
        }
        async function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value) return;
            await fetch(`${API_URL}/api/data`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title: input.value}) });
            input.value = ''; loadTasks();
        }
        async function deleteTask(id) {
            await fetch(`${API_URL}/api/data/${id}`, { method: 'DELETE' });
            loadTasks();
        }
        loadTasks();
    </script>
</body>
</html>
